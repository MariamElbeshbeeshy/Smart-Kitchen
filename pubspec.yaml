name: smart_kitchen
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_svg: ^2.0.10
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.3

  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
